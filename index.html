<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Corporativo Somesso</title>
<style>
:root{
  --verde:#556B2F;
  --verde2:#6B8E23;
  --verdeEscuro:#35451F;
  --fundo:#F5F5F0;
  --card:#ffffff;
  --texto:#2b2b2b;
  --borda:#e0e0d8;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial, sans-serif;background:var(--fundo);color:var(--texto)}
button,a{cursor:pointer}
.login{
  max-width:460px;margin:70px auto;background:#fff;padding:35px;border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,.12)
}
.login h1{text-align:center;color:var(--verdeEscuro);margin-top:0}
.login input,.login button{width:100%;padding:13px;margin-top:10px;border-radius:9px;font-size:15px}
.login input{border:1px solid #ccc}
.login button{background:var(--verde);color:#fff;border:0;font-weight:bold}
.erro{color:#b00020;font-weight:bold}
.app{display:none;min-height:100vh}
.sidebar{
  position:fixed;left:0;top:0;width:260px;height:100vh;background:var(--verdeEscuro);
  color:white;padding:24px 18px;overflow:auto
}
.logo{font-size:22px;font-weight:bold;margin-bottom:5px}
.sublogo{font-size:12px;opacity:.8;margin-bottom:30px}
.menu button{
  display:block;width:100%;margin:8px 0;padding:12px;border:0;border-radius:10px;
  background:transparent;color:white;text-align:left;font-size:15px
}
.menu button:hover,.menu button.ativo{background:var(--verde2)}
.main{margin-left:260px;padding:24px}
.topbar{
  background:#fff;border-radius:16px;padding:18px 22px;display:flex;justify-content:space-between;
  align-items:center;gap:12px;box-shadow:0 4px 16px rgba(0,0,0,.06);margin-bottom:20px
}
.user{font-size:14px;color:#555}
.sair{background:#8b2d2d;color:#fff;border:0;border-radius:9px;padding:10px 14px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.card{
  background:var(--card);border:1px solid var(--borda);border-radius:18px;padding:22px;
  box-shadow:0 5px 18px rgba(0,0,0,.06);transition:.2s
}
.card:hover{transform:translateY(-3px)}
.icon{font-size:34px;margin-bottom:8px}
.card h3{margin:6px 0;color:var(--verdeEscuro)}
.card p{min-height:42px}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  background:var(--verde);color:#fff;border:0;border-radius:9px;padding:10px 13px;text-decoration:none;
  font-size:14px
}
.btn.sec{background:#777}
.busca{width:100%;padding:13px;border:1px solid #ccc;border-radius:10px;margin-bottom:18px}
.viewer{display:none;background:#fff;border-radius:16px;padding:12px;box-shadow:0 5px 18px rgba(0,0,0,.06)}
.viewerTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
iframe{width:100%;height:78vh;border:1px solid #ddd;border-radius:12px;background:#fff}
.status{display:inline-block;background:#dce8cf;color:#2d4716;padding:5px 9px;border-radius:20px;font-size:12px;font-weight:bold}
@media(max-width:850px){
  .sidebar{position:relative;width:100%;height:auto}
  .main{margin-left:0;padding:12px}
  .topbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div id="login" class="login">
  <h1>Portal Somesso</h1>
  <p>Digite seu e-mail cadastrado na aba <b>Usuarios</b>.</p>
  <input id="email" type="email" placeholder="seuemail@gmail.com">
  <button onclick="entrar()">Entrar</button>
  <p id="msg"></p>
</div>

<div id="app" class="app">
  <aside class="sidebar">
    <div class="logo">SOMESSO</div>
    <div class="sublogo">Portal Corporativo</div>
    <div class="menu">
      <button class="ativo" onclick="mostrarDashboard(this)">🏠 Dashboard</button>
      <button onclick="abrirPorNome('Metas e Comissão',this)">📈 Metas e Comissão</button>
      <button onclick="abrirPorNome('Controle de Propostas',this)">📋 Propostas</button>
      <button onclick="abrirPorNome('PCMSO',this)">🩺 PCMSO</button>
      <button onclick="abrirPorNome('Acompanhamento Empresas Gestão',this)">🏢 Gestão</button>
      <button onclick="sair()">🚪 Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h2 id="tituloPagina">Dashboard</h2>
        <div class="user" id="usuarioInfo"></div>
      </div>
      <button class="sair" onclick="sair()">Sair</button>
    </div>

    <section id="dashboard">
      <input id="busca" class="busca" placeholder="Pesquisar sistema..." oninput="renderSistemas()">
      <div id="cards" class="cards"></div>
    </section>

    <section id="viewer" class="viewer">
      <div class="viewerTop">
        <div>
          <b id="viewerTitulo">Sistema</b><br>
          <span class="status">Online</span>
        </div>
        <div>
          <a id="abrirNovaAba" class="btn sec" target="_blank">Abrir em nova aba</a>
          <button class="btn" onclick="mostrarDashboard()">Voltar</button>
        </div>
      </div>
      <iframe id="frameSistema"></iframe>
    </section>
  </main>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMSNie2VlxV25H-3MpvENoBZO6IdF1QByYSpWOl5yd0vAAKQhyXiMuJaqNo42Kc_nX/exec";

let usuario = null;
let sistemas = [];

async function api(dados){
  const resp = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(dados)
  });
  return await resp.json();
}

async function entrar(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const msg = document.getElementById("msg");

  if(!email){
    msg.className="erro";
    msg.innerText="Digite seu e-mail.";
    return;
  }

  msg.innerText="Verificando acesso...";

  try{
    const r = await api({acao:"login",email});
    if(!r.ok){
      msg.className="erro";
      msg.innerText=r.erro || "Acesso negado.";
      return;
    }

    usuario = r.usuario;
    localStorage.setItem("portal_usuario",JSON.stringify(usuario));
    localStorage.setItem("somesso_usuario", JSON.stringify(usuario));
localStorage.setItem("usuario_propostas", JSON.stringify(usuario));
localStorage.setItem("usuario_pcmso", JSON.stringify(usuario));
localStorage.setItem("usuario_gestao", JSON.stringify(usuario));
    abrirPortal();

  }catch(e){
    msg.className="erro";
    msg.innerText="Erro ao conectar com a API.";
  }
}

async function abrirPortal(){
  login.style.display="none";
  app.style.display="block";

  usuarioInfo.innerText =
    `${usuario.nome} | ${usuario.email} | ${usuario.perfil}`;

  await carregarSistemas();
}

async function carregarSistemas(){
  const r = await api({acao:"listarSistemas"});
  sistemas = (r.sistemas || []).filter(s =>
    String(s.Ativo || "").toUpperCase().trim() === "SIM"
  );
  renderSistemas();
}

function iconeSistema(nome){
  nome = String(nome).toLowerCase();
  if(nome.includes("meta")) return "📈";
  if(nome.includes("proposta")) return "📋";
  if(nome.includes("pcmso")) return "🩺";
  if(nome.includes("gest")) return "🏢";
  return "🧩";
}

function renderSistemas(){
  const termo = (busca.value || "").toLowerCase();
  cards.innerHTML = "";

  sistemas
    .filter(s => Object.values(s).join(" ").toLowerCase().includes(termo))
    .forEach(s => {
      cards.innerHTML += `
        <div class="card">
          <div class="icon">${iconeSistema(s.Sistema)}</div>
          <h3>${s.Sistema || ""}</h3>
          <p>${s["Descrição"] || ""}</p>
          <span class="status">Online</span>
          <br><br>
          <div class="btns">
            <button class="btn" onclick='abrirSistema(${JSON.stringify(s)})'>Abrir no Portal</button>
            <a class="btn sec" href="${s.URL}" target="_blank">Nova aba</a>
          </div>
        </div>
      `;
    });
}

function abrirPorNome(nome,btn){
  const s = sistemas.find(x => String(x.Sistema).trim() === nome);
  if(s) abrirSistema(s);
  marcarMenu(btn);
}

function abrirSistema(s){
  const nome = String(s.Sistema || '').toLowerCase();

  if(nome.includes('metas')){
    window.open(s.URL, '_blank');
    return;
  }

  dashboard.style.display="none";
  viewer.style.display="block";
  tituloPagina.innerText = s.Sistema || "Sistema";
  viewerTitulo.innerText = s.Sistema || "Sistema";
  frameSistema.src = s.URL;
  abrirNovaAba.href = s.URL;
}

function mostrarDashboard(btn){
  dashboard.style.display="block";
  viewer.style.display="none";
  frameSistema.src = "";
  tituloPagina.innerText = "Dashboard";
  marcarMenu(btn);
}

function marcarMenu(btn){
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("ativo"));
  if(btn) btn.classList.add("ativo");
}

function sair(){
  localStorage.removeItem("portal_usuario");
  localStorage.removeItem("somesso_usuario");
  localStorage.removeItem("usuario_propostas");
  localStorage.removeItem("usuario_propostas_email");
  localStorage.removeItem("usuario_pcmso");
  localStorage.removeItem("usuario_pcmso_email");
  localStorage.removeItem("usuario_gestao");
  localStorage.removeItem("usuario_gestao_email");
  location.reload();
}

window.onload = () => {
  const salvo = localStorage.getItem("portal_usuario");
  if(salvo){
    usuario = JSON.parse(salvo);
    abrirPortal();
  }
};
</script>

</body>
</html>
